services:
  - type: web
    name: querygraph-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: bash -c "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false  # Set manually in Render dashboard
